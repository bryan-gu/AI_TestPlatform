<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestFlow - 测试管理平台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" crossorigin="anonymous">
  <style>
    .icon-svg {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1em;
      height: 1em;
      vertical-align: -0.125em;
    }
    .icon-svg svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="layout">
    <!-- ========== Sidebar ========== -->
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <div class="logo-icon"><i class="ti ti-test-pipe" aria-hidden="true"></i></div>
        <div class="logo-text">
          <div class="logo-name">TestFlow</div>
          <div class="logo-sub">测试管理平台</div>
        </div>
        <button class="collapse-btn" onclick="toggleSidebar()" title="收起菜单">
          <i class="ti ti-chevrons-left" aria-hidden="true"></i>
        </button>
        <button class="expand-btn" onclick="toggleSidebar()" title="展开菜单">
          <i class="ti ti-chevrons-right" aria-hidden="true"></i>
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-label">项目</div>
        <div class="nav-item active" onclick="switchPage('project')" data-tooltip="项目总览">
          <i class="ti ti-layout-dashboard" aria-hidden="true"></i>
          <span>项目总览</span>
        </div>
        <div class="nav-item" onclick="switchPage('project-list')" data-tooltip="项目管理">
          <i class="ti ti-folder" aria-hidden="true"></i>
          <span>项目管理</span>
          <span class="nav-badge">4</span>
        </div>
        <div class="nav-item" onclick="switchPage('testcase')" data-tooltip="测试用例">
          <i class="ti ti-list-check" aria-hidden="true"></i>
          <span>测试用例</span>
          <span class="nav-badge">128</span>
        </div>
        <div class="nav-item" onclick="switchPage('report')" data-tooltip="测试报告">
          <i class="ti ti-chart-bar" aria-hidden="true"></i>
          <span>测试报告</span>
          <span class="nav-badge">12</span>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-label">知识</div>
        <div class="nav-item" onclick="switchPage('knowledge')" data-tooltip="知识库">
          <i class="ti ti-books" aria-hidden="true"></i>
          <span>知识库</span>
          <span class="nav-badge">36</span>
        </div>
        <div class="nav-item" onclick="switchPage('graph-list')" data-tooltip="知识图谱">
          <i class="ti ti-atom" aria-hidden="true"></i>
          <span>知识图谱</span>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-label">AI</div>
        <div class="nav-item" onclick="switchPage('ai-workbench')" data-tooltip="AI 工作台">
          <i class="ti ti-sparkles" aria-hidden="true"></i>
          <span>AI 工作台</span>
          <span class="nav-badge">运行中</span>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-label">系统管理</div>
        <div class="nav-item" onclick="switchPage('role')" data-tooltip="角色管理">
          <i class="ti ti-shield-half" aria-hidden="true"></i>
          <span>角色管理</span>
        </div>
        <div class="nav-item" onclick="switchPage('user')" data-tooltip="用户管理">
          <i class="ti ti-users" aria-hidden="true"></i>
          <span>用户管理</span>
          <span class="nav-badge">24</span>
        </div>
        <div class="nav-item" onclick="switchPage('ai-config')" data-tooltip="AI 配置">
          <i class="ti ti-settings-cog" aria-hidden="true"></i>
          <span>AI 配置</span>
          <span class="nav-badge">3</span>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="user-row" data-tooltip="张测试 · 管理员">
          <div class="avatar">张</div>
          <div class="user-info">
            <div class="user-name">张测试</div>
            <div class="user-role">管理员</div>
          </div>
          <i class="ti ti-settings" style="font-size:16px;color:var(--color-text-tertiary)" aria-hidden="true"></i>
        </div>
      </div>
    </aside>

    <!-- ========== Main area ========== -->
    <div class="main">
      <header class="header">
        <div class="header-title" id="page-title">项目总览</div>
        <div class="header-search">
          <i class="ti ti-search" aria-hidden="true"></i> 搜索...
        </div>
        <button class="btn-primary" id="main-btn">
          <i class="ti ti-plus" aria-hidden="true"></i>
          <span id="main-btn-text">新建项目</span>
        </button>
      </header>

      <!-- Content area — pages loaded dynamically -->
      <div class="content" id="content-area">
        <div id="page-loading" style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--color-text-tertiary);font-size:14px">
          加载中...
        </div>
      </div>
    </div>
  </div>

  <!-- ========== Dialogs ========== -->
  <div id="dialogs-container"></div>

  <!-- ========== Toast ========== -->
  <div id="toast" style="position:fixed;top:20px;right:20px;background:#1A1A1A;color:#fff;padding:12px 20px;border-radius:var(--border-radius-md);font-size:13px;z-index:9999;display:none;box-shadow:var(--shadow-lg);transform:translateX(120%);transition:transform 0.3s ease">
    <span id="toast-icon" style="margin-right:8px"></span>
    <span id="toast-text"></span>
  </div>

  <script src="shared.js"></script>
  <script>
    // ========== Page loader ==========
    // Pages are loaded from pages/*.html via fetch.
    // Each page file contains the raw HTML for that module's content area.
    // For local development, serve with: npx serve .  or  python -m http.server

    const pageCache = {};
    let currentPage = 'project';

    const pageFiles = {
      'project':          'pages/project.html',
      'project-list':     'pages/project-list.html',
      'testcase':         'pages/testcase.html',
      'knowledge':        'pages/knowledge.html',
      'knowledge-detail': 'pages/knowledge-detail.html',
      'knowledge-docs':   'pages/knowledge-docs.html',
      'doc-preview':      'pages/doc-preview.html',
      'graph-list':       'pages/graph-list.html',
      'graph':            'pages/graph.html',
      'report':           'pages/report.html',
      'role':             'pages/role.html',
      'user':             'pages/user.html',
      'ai-workbench':     'pages/ai-workbench.html',
      'ai-config':        'pages/ai-config.html'
    };

    async function loadPage(id) {
      const contentArea = document.getElementById('content-area');
      const file = pageFiles[id];
      if (!file) return;

      // Show cached or loading
      if (pageCache[id]) {
        contentArea.innerHTML = pageCache[id];
      } else {
        contentArea.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--color-text-tertiary);font-size:14px">加载中...</div>';
        try {
          const resp = await fetch(file);
          if (!resp.ok) throw new Error('Failed to load ' + file);
          const html = await resp.text();
          pageCache[id] = html;
          contentArea.innerHTML = html;
        } catch (e) {
          contentArea.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--color-text-tertiary);font-size:14px">页面加载失败: ' + e.message + '</div>';
          return;
        }
      }

      // Run page-specific init scripts
      const pageInitMap = {
        'project':          initProjectPage,
        'project-list':     initProjectRowClick,
        'testcase':         initTestCasePage,
        'knowledge':        initKnowledgePage,
        'knowledge-detail': initKnowledgePage,
        'knowledge-docs':   initKnowledgePage,
        'doc-preview':      initDocPreviewPage,
        'graph-list':       initGraphListPage,
        'graph':            initGraphPage,
        'report':           initReportPage,
        'role':             initRolePage,
        'user':             initUserPage,
        'ai-workbench':     initAiWorkbenchPage,
        'ai-config':        initAiConfigPage
      };
      if (pageInitMap[id]) pageInitMap[id]();

      // Re-run icon replacement if needed
      if (typeof replaceIconsWithSvg === 'function' && !isIconFontLoaded()) {
        replaceIconsWithSvg();
      }
    }

    // Override switchPage to use async loading
    const _originalSwitchPage = switchPage;
    switchPage = function(id) {
      currentPage = id;
      document.getElementById('page-title').textContent = titles[id] || id;

      // Update main button
      const mainBtn = document.getElementById('main-btn');
      if (id === 'project') {
        mainBtn.style.display = 'none';
      } else {
        mainBtn.style.display = '';
        if (id === 'ai-workbench') {
          updateMainBtn();
        } else {
          mainBtn.style.background = '';
          document.getElementById('main-btn-text').textContent = btnText[id] || '新建';
        }
      }

      // Update sidebar active state
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const navMap = {project:0, 'project-list':1, testcase:2, report:3, knowledge:4, 'graph-list':5, graph:5, role:6, user:7, 'ai-config':8, 'ai-workbench':9};
      const items = document.querySelectorAll('.nav-item');
      if (knowledgeSubPages.includes(id)) {
        if (items[navMap['knowledge']]) items[navMap['knowledge']].classList.add('active');
      } else if (graphSubPages.includes(id)) {
        if (items[navMap['graph-list']]) items[navMap['graph-list']].classList.add('active');
      } else {
        if (items[navMap[id]]) items[navMap[id]].classList.add('active');
      }

      // Load page content
      loadPage(id);
    };

    // Load dialogs on startup
    async function loadDialogs() {
      try {
        const resp = await fetch('dialogs.html');
        if (resp.ok) {
          document.getElementById('dialogs-container').innerHTML = await resp.text();
        }
      } catch (e) {
        console.warn('Dialogs loading failed:', e);
      }
    }

    // Init
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        if (!isIconFontLoaded()) {
          console.log('Tabler Icons字体未加载，使用SVG备用方案');
          replaceIconsWithSvg();
        }
      }, 500);

      const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
      if (isCollapsed) {
        document.getElementById('sidebar').classList.add('collapsed');
      }

      document.getElementById('main-btn').style.display = 'none';

      loadDialogs();
      switchPage('project');
    });
  </script>
</body>
</html>
